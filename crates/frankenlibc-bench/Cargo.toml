# inet_addr vs host glibc (dlmopen). Measures the parse_ipv4_bsd byte-walk rewrite.
[[bench]]
name = "inet_addr_glibc_bench"
harness = false
required-features = ["abi-bench"]

# RELIABLE in-process inet_pton: core vs REAL in-process glibc (no abi-bench → no fl
